<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050f1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hash" />
    <title>Hash</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #050f1f; }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #050f1f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }

      .splash-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: splashIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      @keyframes splashIn {
        from { transform: scale(0.78); }
        to   { transform: scale(1); }
      }

      .splash-icon {
        width: 80px;
        height: 80px;
        border-radius: 24px;
        background: #071428;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash-wordmark {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 28px;
        letter-spacing: 0.06em;
        color: #ffffff;
      }

      .splash-dots {
        display: flex;
        gap: 7px;
      }
      .splash-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #1E90FF;
        animation: dot 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40%           { transform: scale(1);   opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">
        <div class="splash-icon">
          <svg viewBox="0 0 100 100" width="50" height="50">
            <g fill="#ffffff">
              <rect x="32" y="10" width="11" height="80"/>
              <rect x="57" y="10" width="11" height="80"/>
              <rect x="10" y="32" width="80" height="11"/>
              <rect x="10" y="57" width="80" height="11"/>
            </g>
            <g fill="#00CFFF">
              <circle cx="37" cy="37" r="7"/>
              <circle cx="63" cy="37" r="7"/>
              <circle cx="37" cy="63" r="7"/>
              <circle cx="63" cy="63" r="7"/>
            </g>
          </svg>
        </div>
        <span class="splash-wordmark">HASH</span>
      </div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
